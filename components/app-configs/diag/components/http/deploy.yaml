apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: http-receiver
    app.kubernetes.io/component: http-receiver
    app.kubernetes.io/instance: http-receiver
    app.kubernetes.io/name: http-receiver
    app.kubernetes.io/part-of: http-receiver
  name: http-receiver
spec:
  replicas: 1
  selector:
    matchLabels:
      deploy: http-receiver
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        deploy: http-receiver
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - |
          pip install pyserv
          serv 8080
        image: registry.access.redhat.com/ubi8/python-311:latest
        name: python
        ports:
        - containerPort: 8080
          protocol: TCP
          name: 8080-tcp
      restartPolicy: Always
