apiVersion: tuned.openshift.io/v1
kind: Tuned
metadata:
  name: hugepages-1g
  namespace: openshift-cluster-node-tuning-operator
spec:
  profile:
  - name: openshift-node-hugepages-1g
    data: |
      [main]
      summary=Boot time configuration for hugepages-1G
      include=openshift-node
      [vm]
      transparent_hugepages=never
      [bootloader]
      cmdline_openshift_node_hugepages=default_hugepagesz=1G hugepagesz=1G hugepages=8
  recommend:
  - machineConfigLabels:
      machineconfiguration.openshift.io/role: "hp-1g"
    priority: 30
    profile: openshift-node-hugepages-1g
