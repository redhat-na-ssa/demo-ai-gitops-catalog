apiVersion: tuned.openshift.io/v1
kind: Tuned
metadata:
  name: hugepages-2m
  namespace: openshift-cluster-node-tuning-operator
spec:
  profile:
  - name: openshift-node-hugepages-2m
    data: |
      [main]
      summary=Boot time configuration for hugepages-2M
      include=openshift-node
      [bootloader]
      cmdline_openshift_node_hugepages=hugepagesz=2M hugepages=4096
  recommend:
  - machineConfigLabels:
      machineconfiguration.openshift.io/role: "hp-2m"
    priority: 30
    profile: openshift-node-hugepages-2m
