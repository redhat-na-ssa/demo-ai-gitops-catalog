---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: socat
spec:
  tags:
  - name: latest
---
kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: socat
spec:
  output:
    to:
      kind: ImageStreamTag
      name: 'socat:latest'
  strategy:
    type: Docker
    dockerStrategy:
      # from:
      #   kind: DockerImage
      #   name: 'quay.io/fedora/fedora-minimal:43'
  source:
    type: Dockerfile
    dockerfile: |
      # ARG BASE_IMAGE=quay.io/fedora/fedora-minimal:43
      ARG BASE_IMAGE=registry.access.redhat.com/ubi9/ubi

      # hadolint ignore=DL3006
      FROM ${BASE_IMAGE}

      # hadolint ignore=DL3033
      RUN yum install -y socat && \
          yum clean all

      EXPOSE 6666

      # hadolint ignore=DL3025
      # CMD trap : TERM INT; sleep infinity & wait
      CMD socat - TCP4-LISTEN:6666,fork
  runPolicy: SerialLatestOnly
  triggers:
  - imageChange: {}
    type: ImageChange
  - type: ConfigChange
