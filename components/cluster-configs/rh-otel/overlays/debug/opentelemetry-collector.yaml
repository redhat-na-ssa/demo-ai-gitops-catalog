apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel
  namespace: demo-otel-collector
spec:
  serviceAccount: otel
  mode: daemonset
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - NET_BIND_SERVICE
      - SETGID
      - SETPCAP
      - SETUID
    readOnlyRootFilesystem: true
    seLinuxOptions:
      type: spc_t
    seccompProfile:
      type: RuntimeDefault
  volumeMounts:
    - name: ca-bundle
      mountPath: /etc/pki/ca-trust/source/service-ca
      readOnly: true
    - mountPath: /hostfs
      name: host
      readOnly: true
    - name: journal-logs
      mountPath: /var/log/journal/
      readOnly: true
  volumes:
    - name: ca-bundle
      configMap:
        name: ca-bundle
    - hostPath:
        path: /
      name: host
    - name: journal-logs
      hostPath:
        path: /var/log/journal
  config:
    processors:
      batch:
        send_batch_size: 512
        send_batch_max_size: 1024
        timeout: 1s
      groupbyattrs:
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
    receivers:
      hostmetrics:
        collection_interval: 60s
        initial_delay: 1s
        root_path: /
        scrapers:
          cpu: {}
          memory: {}
          disk: {}
          load: {}
          filesystem: {}
          paging: {}
          processes: {}
          process: {}
      k8s_cluster:
        distribution: openshift
        collection_interval: 60s
      k8sobjects:
        auth_type: serviceAccount
        objects:
          - name: pods
            mode: pull
            interval: 60s
          - name: events
            mode: watch
      kubeletstats:
        collection_interval: 60s
        auth_type: "serviceAccount"
        endpoint: "https://${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
      journald:
        files: /var/log/journal/*/*
        priority: info
        units:
          - kubelet
          - crio
          - init.scope
          - dnsmasq
        all: true
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 60s
          max_elapsed_time: 5m
      k8s_events: {}
        # namespaces: [project1, project2]
    exporters:
      debug:
        verbosity: detailed
    service:
      pipelines:
        logs:
          exporters:
            - debug
          processors:
            - batch
          receivers:
            - k8s_cluster
            - k8s_events
            - k8sobjects
            - journald
        metrics:
          exporters:
            - debug
          processors:
            - k8sattributes
          receivers:
            - hostmetrics
            - k8s_cluster
            - kubeletstats
  env:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
